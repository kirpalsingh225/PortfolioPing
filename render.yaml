services:
  - type: web
    name: stock-portfolio-whatsapp-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: LLM_PROVIDER
        value: openrouter
      - key: OPENROUTER_MODEL
        value: openai/gpt-oss-120b:free
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1

  - type: worker
    name: stock-portfolio-whatsapp-worker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: arq worker.WorkerSettings
    envVars:
      - key: APP_ENV
        value: production
      - key: LLM_PROVIDER
        value: openrouter
      - key: OPENROUTER_MODEL
        value: openai/gpt-oss-120b:free
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
